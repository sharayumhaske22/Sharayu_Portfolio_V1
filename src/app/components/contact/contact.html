<section id="contact" class="py-24 px-6">
  <div class="max-w-4xl mx-auto text-center">

    <h2 #titleEl class="text-4xl md:text-5xl font-bold text-foreground mb-4 font-mono">{{ titleText() }}</h2>
    <p class="text-muted max-w-xl mx-auto mb-16 leading-relaxed">
      Have a project in mind or want to collaborate? Feel free to reach out.
      I'm always open to discussing new opportunities and exciting projects.
    </p>

    <!-- Contact Information -->
    <h3 class="text-xl font-bold text-foreground font-mono mb-6">Contact Information</h3>
    <div class="grid sm:grid-cols-2 gap-4 mb-16">

      <a href="mailto:{{ email }}" class="flex items-center gap-4 bg-surface border border-border rounded-xl p-5 text-left hover:border-primary/40 transition-colors">
        <div class="w-11 h-11 rounded-lg bg-primary/10 flex items-center justify-center text-primary shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg>
        </div>
        <div>
          <p class="text-sm font-bold text-foreground">Email</p>
          <p class="text-sm text-muted">{{ email }}</p>
        </div>
      </a>

      <a href="https://www.google.com/maps/search/?api=1&query={{ location }}" target="_blank" rel="noopener"
             class="flex items-center gap-4 bg-surface border border-border rounded-xl p-5 text-left hover:border-primary/40 transition-colors">
        <div class="w-11 h-11 rounded-lg bg-primary/10 flex items-center justify-center text-primary shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div>
          <p class="text-sm font-bold text-foreground">Location</p>
          <p class="text-sm text-muted">{{ location }}</p>
        </div>
     </a>

    </div>

    <!-- Connect With Me -->
    <h3 class="text-xl font-bold text-foreground font-mono mb-6">Connect With Me</h3>
    <div class="grid sm:grid-cols-3 gap-4">

      <a [href]="linkedin" target="_blank" rel="noopener"
        class="flex items-center justify-center gap-2 bg-primary text-background font-semibold py-3.5 rounded-full hover:opacity-90 transition-opacity">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.03-1.85-3.03-1.85 0-2.14 1.44-2.14 2.94v5.66H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.07 2.07 0 1 1 0-4.13 2.07 2.07 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45z"/></svg>
        LinkedIn
      </a>

      <a [href]="github" target="_blank" rel="noopener"
        class="flex items-center justify-center gap-2 bg-primary text-background font-semibold py-3.5 rounded-full hover:opacity-90 transition-opacity">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.87-.01-1.71-2.78.62-3.37-1.36-3.37-1.36-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.05 1.53 1.05.89 1.57 2.34 1.12 2.91.85.09-.66.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.32 9.32 0 0 1 5 0c1.9-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.81 0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/></svg>
        GitHub
      </a>

      <a href="mailto:{{ email }}"
        class="flex items-center justify-center gap-2 bg-primary text-background font-semibold py-3.5 rounded-full hover:opacity-90 transition-opacity">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg>
        Email
      </a>

    </div>

  </div>
</section>
