<section id="experience" class="py-24 px-6">
  <div class="max-w-4xl mx-auto">

   
    <h2 #titleEl class="text-4xl md:text-5xl font-bold text-foreground font-mono mb-3 text-center">
      {{ titleText() }}
    </h2>
    <div class="w-16 h-1 bg-primary rounded-full mx-auto mb-16"></div>
   

    <div class="relative pl-9">
      <div class="absolute top-2 bottom-2"
           style="left: 8px; width: 6px; border-radius: 9999px; background: linear-gradient(to bottom, var(--color-primary), transparent);">
      </div>

      <div class="space-y-8">
        @for (entry of entries; track entry.company) {
          <div class="relative">
            <span class="absolute -left-8 top-6 w-3.5 h-3.5 rounded-full bg-primary ring-4 ring-background"></span>

            <div class="bg-surface border border-border rounded-2xl p-6 hover:border-primary hover:-translate-y-1 hover:shadow-lg transition-all duration-200 group ml-6">
              <div class="flex items-start justify-between gap-3 mb-1">
                <h3 class="text-lg font-bold text-foreground group-hover:text-primary font-mono flex items-center gap-2 transition-colors">
                  {{ entry.role }}
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="opacity-60"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>
                </h3>
                <span class="shrink-0 text-xs font-mono px-2.5 py-1 rounded-md border border-primary/40 text-primary">
                  {{ entry.tag }}
                </span>
              </div>

              <p class="text-sm text-accent font-semibold mb-1">
                {{ entry.company }} <span class="text-muted font-normal">· {{ entry.location }}</span>
              </p>
              <p class="text-xs text-muted font-mono mb-4">{{ entry.period }}</p>

              <ul class="space-y-2">
                @for (bullet of entry.bullets; track bullet) {
                  <li class="flex gap-2.5 text-sm text-muted leading-relaxed">
                    <span class="text-primary mt-1 shrink-0 text-xs">▸</span>
                    <span [innerHTML]="bullet"></span>
                  </li>
                }
              </ul>
            </div>
          </div>
        }
      </div>
    </div>

  </div>
</section>
