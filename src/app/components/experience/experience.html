<section id="experience" class="py-24 px-6">
  <div class="max-w-3xl mx-auto">

    <h2 #titleEl class="text-4xl md:text-5xl font-bold text-foreground mb-2 font-mono">
     {{ titleText() }}
    </h2>
    <div class="w-16 h-1 bg-primary rounded-full mb-16"></div>

    <div class="relative pl-8">
      <!-- vertical line -->
      <div class="absolute left-[5px] top-2 bottom-2 w-px bg-border"></div>

      <div class="space-y-10">
        @for (entry of entries; track entry.company) {
          <div class="relative">
            <!-- dot marker -->
            <span class="absolute -left-8 top-2 w-3 h-3 rounded-full bg-primary ring-4 ring-background"></span>

            <div class="bg-surface border border-border rounded-2xl p-6 hover:border-primary/40 transition-colors">
              <div class="flex items-start justify-between gap-3 mb-1">
                <h3 class="text-lg font-bold text-foreground font-mono">{{ entry.role }}</h3>
                <span class="shrink-0 text-xs font-mono px-2.5 py-1 rounded-md border border-primary/40 text-primary">
                  {{ entry.tag }}
                </span>
              </div>

              <p class="text-sm text-accent font-semibold mb-1">
                {{ entry.company }} <span class="text-muted font-normal">· {{ entry.location }}</span>
              </p>
              <p class="text-xs text-muted font-mono mb-4">{{ entry.period }}</p>

              <ul class="space-y-2">
                @for (bullet of entry.bullets; track bullet) {
                  <li class="text-sm text-muted leading-relaxed">{{ bullet }}</li>
                }
              </ul>
            </div>
          </div>
        }
      </div>
    </div>

  </div>
</section>
