<section class="dotted-bg bg-background min-h-screen flex items-center just px-6 pt-24">
  <div class="max-w-6xl mx-auto w-full grid md:grid-cols-[1.2fr_0.8fr] gap-12 items-center">

    <!-- Left: text content -->
    <div>
      <p class="font-mono text-sm text-primary mb-4 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
        status: available for work
      </p>

      <h1 class="text-4xl md:text-6xl font-bold text-foreground mb-4 font-mono tracking-tight">
        {{ displayName() }}
      </h1>

      <p class="font-mono text-lg md:text-xl text-accent mb-6 h-8">
        &gt; {{ displayRole() }}<span class="animate-pulse">_</span>
      </p>

      <p class="text-muted text-base leading-relaxed mb-8 max-w-md">
        Building reliable backend systems and fine-tuning language models.<br>
        Three years across research labs and product teams.<br>
        Currently shipping full-stack features end to end.
      </p>

      <div class="flex flex-wrap gap-4">
        <a href="#contact" class="px-6 py-3 rounded-full bg-primary text-background font-semibold hover:opacity-90 transition-opacity">
          Let's Connect
        </a>
        <a href="#projects" class="px-6 py-3 rounded-full border-2 border-primary text-primary font-semibold hover:bg-primary/10 transition-colors">
          View Work
        </a>
      </div>
    </div>

    <!-- Right: circular image -->
    <div class="flex justify-center md:justify-end">
      <div class="w-56 h-56 md:w-72 md:h-72 rounded-full overflow-hidden border-4 border-primary/30 shadow-lg">
        <img src="/images/profile.jpg" alt="Sharayu Mhaske" class="w-full h-full object-cover" />
      </div>
    </div>

  </div>
</section>
