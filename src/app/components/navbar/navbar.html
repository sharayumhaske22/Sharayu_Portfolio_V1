<nav class="fixed top-0 w-full z-50 bg-background/90 backdrop-blur-md border-b border-border transition-colors duration-500">

  <div class="absolute top-0 left-0 h-1 bg-primary transition-[width] duration-150 ease-out"
       [style.width.%]="scrollProgress()">
  </div>

  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">

    <div class="flex items-center gap-4">
      <button (click)="toggleMenu()" aria-label="Menu" class="flex flex-col gap-1.5 p-2">
        <span class="w-8 h-1 bg-foreground rounded-full"></span>
        <span class="w-8 h-1 bg-foreground rounded-full"></span>
        <span class="w-8 h-1 bg-foreground rounded-full"></span>
      </button>

      <button (click)="refreshPage()" aria-label="Home">
        <a href="#" aria-label="Home" class="text-xl font-extrabold font-sans text-foreground hover:text-primary transition-colors">
          &lt;@SM&gt;
        </a>
      </button>
    </div>
    <div class="hidden md:flex items-center gap-10 text-xl font-extrabold font-mono text-foreground">

      <a href="#about" class="hover:text-primary transition-colors">About</a>
      <a href="#projects" class="hover:text-primary transition-colors">Projects</a>
      <a href="#skills" class="hover:text-primary transition-colors">Skills</a>
      <a href="#experience" class="hover:text-primary transition-colors">Experience</a>
      <a href="#contact" class="hover:text-primary transition-colors">Contact</a>
    

      <button (click)="theme.toggle()" class="w-12 h-12 rounded-full flex items-center justify-center bg-surface hover:scale-110 transition-transform" aria-label="Toggle theme">
        @if (theme.isDark()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-foreground">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-foreground">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        }
      </button>
    </div>
  </div>

  @if (isMenuOpen()) {
    <div class="md:hidden flex flex-col items-center gap-6 py-8 text-lg font-semibold font-mono text-foreground bg-background border-t border-border">
      <a (click)="closeMenu()" href="#about" class="hover:text-primary transition-colors">About</a>
      <a (click)="closeMenu()" href="#skills" class="hover:text-primary transition-colors">Skills</a>
      <a (click)="closeMenu()" href="#projects" class="hover:text-primary transition-colors">Projects</a>
      <a (click)="closeMenu()" href="#experience" class="hover:text-primary transition-colors">Experience</a>
      <a (click)="closeMenu()" href="#contact" class="hover:text-primary transition-colors">Contact</a>
      <button (click)="theme.toggle()" class="w-12 h-12 rounded-full flex items-center justify-center bg-surface" aria-label="Toggle theme">
        @if (theme.isDark()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-foreground">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-foreground">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        }
      </button>
    </div>
  }
</nav>
