<section id="projects" class="py-24 px-6">
  <div class="max-w-6xl mx-auto">

    <h2 #titleEl class="text-4xl md:text-5xl font-bold text-foreground mb-2 font-mono text-center">{{ titleText() }}</h2>
    <div class="w-16 h-1 bg-primary rounded-full mx-auto mb-16"></div>

    <div class="relative">

      <button (click)="scroll('left')" aria-label="Previous project"
        class="hidden md:flex absolute -left-5 top-1/2 -translate-y-1/2 z-10 w-10 h-10 rounded-full bg-surface border border-border items-center justify-center text-foreground hover:border-primary hover:-translate-y-0.5 transition-all">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>

      <div #scrollTrack class="flex gap-6 overflow-x-auto scroll-smooth snap-x snap-mandatory pb-4" style="scrollbar-width: none;">
        @for (project of projects; track project.title) {
          <div class="snap-start shrink-0 w-[85%] sm:w-[420px] bg-surface border border-border rounded-2xl overflow-hidden hover:border-primary hover:-translate-y-1 hover:shadow-lg hover:shadow-primary/10 transition-all duration-200">

            <!-- screenshot -->
            <div class="h-44 overflow-hidden bg-background">
              <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover" />
            </div>

            <!-- content -->
            <div class="p-6">
              <span class="text-xs font-mono px-2.5 py-1 rounded-md border border-primary/40 text-primary">
                {{ project.tag }}
              </span>
              <h3 class="text-xl font-bold text-foreground mt-3 mb-2">{{ project.title }}</h3>
              <p class="text-sm text-muted leading-relaxed mb-4">{{ project.description }}</p>

              <div class="flex flex-wrap gap-2 mb-5">
                @for (t of project.tech; track t) {
                  <span class="px-2.5 py-1 rounded-md bg-background border border-border text-xs text-foreground font-mono hover:bg-primary hover:text-background hover:border-primary hover:-translate-y-0.5 transition-all duration-150 cursor-default">
                    {{ t }}
                  </span>
                }
              </div>

              <a [href]="project.link" target="_blank" rel="noopener"
                class="text-sm font-semibold text-primary hover:opacity-80 transition-opacity">
                {{ project.linkLabel }}
              </a>
            </div>

          </div>
        }
      </div>

      <button (click)="scroll('right')" aria-label="Next project"
        class="hidden md:flex absolute -right-5 top-1/2 -translate-y-1/2 z-10 w-10 h-10 rounded-full bg-surface border border-border items-center justify-center text-foreground hover:border-primary hover:-translate-y-0.5 transition-all">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>

    </div>
  </div>
</section>
